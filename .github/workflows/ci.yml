name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Erlang and Gleam
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          rebar3-version: "3"
          gleam-version: "1.12.0"

      - name: Run Skir formatting
        run: npx skir format --ci

      - name: Run Skir codegen
        run: npx skir gen

      - name: Run pre-commit checks
        run: ./pre_commit.sh
